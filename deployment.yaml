apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: ACCOUNT-ID.dkr.ecr.ap-south-1.amazonaws.com/myapp:latest
        ports:
        - containerPort: 5000
